name = "morph-uav-form"
main = "src/index.js"
compatibility_date = "2024-01-01"

# Workers Sites configuration for serving static files
[site]
bucket = "./"
exclude = [
  "node_modules",
  "src",
  "test",
  "tests",
  "coverage",
  "dist",
  ".git",
  ".github",
  ".gitignore",
  ".DS_Store",
  "wrangler.toml",
  "package.json",
  "package-lock.json",
  "yarn.lock",
  "pnpm-lock.yaml",
  "worker.js",
  "README*",
  "LICENSE*",
  "*.md"
]
