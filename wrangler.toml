name = "morph-uav-form"
main = "worker.js"
compatibility_date = "2024-01-01"

# Workers Sites configuration
# This specifies the root directory for static assets
# When deployed, wrangler automatically injects code to serve files from this directory
# The bucket = "." means serve files from the current directory
[site]
bucket = "."

# Environment variables (configure via Cloudflare dashboard or CLI)
# [vars]
# ENVIRONMENT = "production"

# Secrets (configure via `wrangler secret put <KEY>`)
# EMAIL_API_KEY - for email service integration

# Routes (configure as needed for your domain)
# routes = [
#   { pattern = "morph.aiotize.com/*", zone_name = "aiotize.com" }
# ]

# Asset binding for serving static files
# [[assets]]
# binding = "ASSETS"
